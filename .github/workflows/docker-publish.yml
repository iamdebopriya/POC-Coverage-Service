name: Build and Push Coverage Dashboard to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'coverage-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./coverage-service/backend
          dockerfile: ./coverage-service/backend/Dockerfile
          push: true
          tags: debopriyalahiri/coverage-dashboard:backend-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./coverage-service/frontend
          dockerfile: ./coverage-service/frontend/Dockerfile
          push: true
          tags: debopriyalahiri/coverage-dashboard:frontend-latest